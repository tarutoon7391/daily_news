name: Daily AI News

on:
  schedule:
    - cron: "0 22 * * *"  # JST 7:00
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    permissions:
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq libxml2-utils python3

      # --- Date & Tasks ---

      - name: Get today's date (JST)
        run: |
          TODAY=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          TODAY_DISPLAY=$(TZ=Asia/Tokyo date '+%Y/%m/%d（%a）' | sed 's/Mon/月/;s/Tue/火/;s/Wed/水/;s/Thu/木/;s/Fri/金/;s/Sat/土/;s/Sun/日/')
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          echo "TODAY_DISPLAY=$TODAY_DISPLAY" >> $GITHUB_ENV

      - name: Load tasks for today
        run: |
          TASK_LIST=$(python3 -c "
          import yaml, os
          today = os.environ['TODAY']
          with open('tasks.yml', 'r') as f:
              tasks = yaml.safe_load(f)
          lines = []
          if tasks:
              for t in tasks:
                  d = str(t.get('date', ''))
                  task = str(t.get('task', ''))
                  if d == today or d == 'every':
                      lines.append('・' + task)
          if lines:
              print('\n'.join(lines))
          else:
              print('今日のタスクはありません 🎉')
          ")

          echo "TASK_LIST<<EOF" >> $GITHUB_ENV
          echo "$TASK_LIST" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # --- Fetch RSS ---

      - name: Fetch ITmedia AI+ Top 5 News
        run: |
          HTTP_CODE=$(curl -s -o it_raw.xml -w "%{http_code}" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://rss.itmedia.co.jp/rss/2.0/aiplus.xml)

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "ITmedia AI+ RSSの取得に失敗（HTTP $HTTP_CODE）、スキップします..."
            for i in 1 2 3 4 5; do
              echo "IT${i}_INPUT=ITmedia AI+記事を取得できませんでした" >> $GITHUB_ENV
            done
            exit 0
          fi

          DETECTED=$(file -bi it_raw.xml | grep -oP 'charset=\K[^ ;]+' || echo "utf-8")
          if [ "$DETECTED" != "utf-8" ] && [ "$DETECTED" != "us-ascii" ]; then
            iconv -f "$DETECTED" -t UTF-8 it_raw.xml > it.xml
          else
            mv it_raw.xml it.xml
          fi

          if ! xmllint --noout it.xml 2>/dev/null; then
            echo "ITmedia AI+のレスポンスが有効なXMLではありません、スキップします..."
            for i in 1 2 3 4 5; do
              echo "IT${i}_INPUT=ITmedia AI+記事を取得できませんでした" >> $GITHUB_ENV
            done
            exit 0
          fi

          for i in 1 2 3 4 5; do
            TITLE=$(xmllint --xpath "string(//item[$i]/title)" it.xml 2>/dev/null || echo "")
            DESC=$(xmllint --xpath "string(//item[$i]/description)" it.xml 2>/dev/null || echo "")
            if [ -z "$TITLE" ]; then
              echo "IT${i}_INPUT=ITmedia AI+記事${i}件目を取得できませんでした" >> $GITHUB_ENV
            else
              echo "IT${i}_INPUT<<EOF" >> $GITHUB_ENV
              echo "【${TITLE}】${DESC}" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            fi
          done

      # --- AI Summary ---

      - name: Summarize with AI
        env:
          API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          summarize() {
            RESPONSE=$(jq -n --arg content "$1" '{
              model: "gpt-4o-mini",
              messages: [
                {role: "system", content: "ニュースのタイトルと概要から、何が起きたか・なぜ重要かを具体的に2行で要約してください。固有名詞や数字は省略しないでください。"},
                {role: "user", content: $content}
              ]
            }' | curl -s https://models.inference.ai.azure.com/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $API_KEY" \
              -d @-)
            RESULT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            if [ -z "$RESULT" ]; then
              echo "（要約を取得できませんでした）"
            else
              echo "$RESULT"
            fi
          }

          IT1_SUMMARY=$(summarize "$IT1_INPUT")
          IT2_SUMMARY=$(summarize "$IT2_INPUT")
          IT3_SUMMARY=$(summarize "$IT3_INPUT")
          IT4_SUMMARY=$(summarize "$IT4_INPUT")
          IT5_SUMMARY=$(summarize "$IT5_INPUT")

          echo "IT1_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$IT1_SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "IT2_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$IT2_SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "IT3_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$IT3_SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "IT4_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$IT4_SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "IT5_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$IT5_SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # --- Send to Discord ---

      - name: Send to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          CONTENT=$(printf '📋 **今日のタスク**（%s）\n%s\n\n━━━━━━━━━━━━━━\n\n📰 **今日のIT・AIニュース TOP5**\n\n💻 **【IT①】**\n%s\n\n💻 **【IT②】**\n%s\n\n💻 **【IT③】**\n%s\n\n💻 **【IT④】**\n%s\n\n💻 **【IT⑤】**\n%s' "$TODAY_DISPLAY" "$TASK_LIST" "$IT1_SUMMARY" "$IT2_SUMMARY" "$IT3_SUMMARY" "$IT4_SUMMARY" "$IT5_SUMMARY")

          jq -n --arg content "$CONTENT" '{content: $content}' | curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            -d @- \
            "$WEBHOOK"